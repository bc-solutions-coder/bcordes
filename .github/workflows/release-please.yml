name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Log in to Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Parse semver from tag
        id: semver
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          # Strip leading 'v' and component prefix (e.g., bcordes-v0.1.5 → 0.1.5)
          VERSION="${TAG##*-v}"
          if [ -z "$VERSION" ]; then
            VERSION="${TAG#v}"
          fi
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION#*.}"
          MINOR="${MINOR%%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

      - name: Retag nightly as latest + semver
        run: |
          SRC="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly"
          DST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          crane copy "$SRC" "$DST:latest"
          crane copy "$SRC" "$DST:${{ steps.semver.outputs.version }}"
          crane copy "$SRC" "$DST:${{ steps.semver.outputs.minor }}"
          crane copy "$SRC" "$DST:${{ steps.semver.outputs.major }}"
          echo "Retagged nightly → latest, ${{ steps.semver.outputs.version }}, ${{ steps.semver.outputs.minor }}, ${{ steps.semver.outputs.major }}"
