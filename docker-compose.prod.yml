# Production stack — deploy via Portainer
# Requires .env file with secrets (see .env.example)
# Wallow API + Postgres are stood up separately
services:
  # ============================================
  # FRONTEND
  # ============================================
  web:
    image: ghcr.io/bc-solutions-coder/bcordes:latest
    container_name: bcordes
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      - WALLOW_API_URL=${WALLOW_API_URL:-https://api.wallow.dev}
      - VALKEY_URL=${VALKEY_URL}
      - OIDC_ISSUER=${OIDC_ISSUER:-https://api.wallow.dev}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI}
      - OIDC_SERVICE_CLIENT_ID=${OIDC_SERVICE_CLIENT_ID}
      - OIDC_SERVICE_CLIENT_SECRET=${OIDC_SERVICE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    labels:
      - pangolin.proxy-resources.personal.name=personal
      - pangolin.proxy-resources.personal.full-domain=bcordes.dev
      - pangolin.proxy-resources.personal.protocol=http
      - pangolin.proxy-resources.personal.targets[0].method=http
      - pangolin.proxy-resources.personal.targets[0].port=3000

  # ============================================
  # CACHE (session store)
  # ============================================
  valkey:
    image: valkey/valkey:8-alpine
    container_name: bcordes-valkey
    restart: unless-stopped
    command: valkey-server --appendonly yes --requirepass ${VALKEY_PASSWORD}
    volumes:
      - valkey_data:/data
    environment:
      REDISCLI_AUTH: ${VALKEY_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: bcordes-network

volumes:
  valkey_data:
