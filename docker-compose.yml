# Local dev infrastructure — run alongside `pnpm dev` and local Wallow
services:
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: valkey-server --appendonly yes --requirepass ${VALKEY_PASSWORD:-devpassword}
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - valkey_data:/data

volumes:
  valkey_data:
